; Surcharges PHP locales pour ProgramFlow.
; Laragon (et la plupart des serveurs PHP-FPM) lisent ce fichier
; automatiquement. Il permet de relever les limites d'upload sans
; toucher au php.ini global.

upload_max_filesize = 64M
post_max_size = 80M
max_file_uploads = 30
max_execution_time = 120
max_input_time = 120
memory_limit = 256M
